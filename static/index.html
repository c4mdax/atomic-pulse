<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtomicPulse | Web Interface</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #d1d1d1;
            --text-muted: #888;
            --accent: #50FA7B;
            --error: #FF5555;
            --warning: #FFB86C;
            --border: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 40px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }
        .header h1 { margin: 0; color: silver; letter-spacing: 2px; }
        .btn {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid #444;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover { background-color: #2c2c2c; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background-color: var(--panel-bg);
            padding: 20px;
            flex: 1;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .card h3 { margin: 0 0 10px 0; color: var(--text-muted); font-size: 12px; }
        .card p { margin: 0; font-size: 28px; font-weight: bold; color: silver; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--panel-bg);
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { background-color: #242424; color: white; }
        tr:hover { background-color: #2a2a2a; }
        
        #status-bar {
            margin-top: 20px;
            padding: 15px;
            background-color: var(--panel-bg);
            border-left: 4px solid var(--text-muted);
            font-size: 14px;
        }
        .status-success { border-left-color: var(--accent) !important; color: var(--accent); }
        .status-error { border-left-color: var(--error) !important; color: var(--error); }
        .status-warning { border-left-color: var(--warning) !important; color: var(--warning); }
    </style>
</head>
<body>

    <div class="header">
        <h1>ATOMIC PULSE</h1>
        <div>
            <button class="btn" id="btn-load" onclick="loadData()">LOAD DATA</button>
            <button class="btn" id="btn-sync" onclick="syncData()">SYNC WITH EIA</button>
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <h3>TOTAL RECORDS</h3>
            <p id="val-total">0</p>
        </div>
        <div class="card">
            <h3>AVG OUTAGE (MW)</h3>
            <p id="val-avg">0.0</p>
        </div>
        <div class="card">
            <h3>MAX OUTAGE (MW)</h3>
            <p id="val-max">0</p>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>DATE</th>
                <th>STATUS ID</th>
                <th>OUTAGE (MW)</th>
                <th>IMPACT %</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="4" style="text-align:center; color:#888;">No data loaded.</td></tr>
        </tbody>
    </table>

    <div id="status-bar">System Online | Waiting for input...</div>

    <script>
        const API_KEY = "vegeta>goku123";
        const headers = { "X-API-Key": API_KEY };
        const statusBar = document.getElementById('status-bar');

        function setStatus(msg, type) {
            statusBar.className = `status-${type}`;
            statusBar.innerText = msg;
        }

        async function loadData() {
            setStatus("Loading data...", "");
            try {
                // Fetch Summary
                const sumRes = await fetch('/summary', { headers });
                if (sumRes.ok) {
                    const sum = await sumRes.json();
                    document.getElementById('val-total').innerText = sum.total_records;
                    document.getElementById('val-avg').innerText = sum.avg_outage_mw.toFixed(2);
                    document.getElementById('val-max').innerText = sum.max_outage_mw.toFixed(1);
                }

                // Fetch Data
                const dataRes = await fetch('/data?limit=50', { headers });
                
                if (dataRes.status === 500) {
                    setStatus("⚠️ Database not initialized. Please click 'SYNC WITH EIA'.", "warning");
                    return;
                }
                
                if (!dataRes.ok) throw new Error("API Error");
                
                const rows = await dataRes.json();
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';

                if (rows.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No records found.</td></tr>';
                    setStatus("⚠️ No data found in database. Please click 'SYNC WITH EIA'.", "warning");
                    return;
                }

                rows.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${row.date_key}</td>
                        <td>${row.status_id}</td>
                        <td>${row.outage_mw.toFixed(1)}</td>
                        <td>${row.percent_outage}%</td>
                    `;
                    tbody.appendChild(tr);
                });

                setStatus("✅ Data successfully loaded from local database.", "success");

            } catch (error) {
                setStatus("❌ Connection Error: Ensure API is running and API Key is correct.", "error");
            }
        }

        async function syncData() {
            const btn = document.getElementById('btn-sync');
            btn.disabled = true;
            setStatus("🔄 Syncing with EIA API... please wait.", "");
            
            try {
                const res = await fetch('/refresh', { method: 'POST', headers });
                const result = await res.json();
                
                if (res.ok) {
                    setStatus(`✅ ${result.message} (${result.records_processed} new records)`, "success");
                    loadData(); // Auto refresh table
                } else {
                    setStatus(`❌ Sync failed: ${result.detail}`, "error");
                }
            } catch (error) {
                setStatus("❌ Fatal Error: API unreachable.", "error");
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
